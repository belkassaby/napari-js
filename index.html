<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>napari-js playground</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #ddd;
        font:
          14px/1.4 system-ui,
          sans-serif;
      }
      #c {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #toolbar {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #toolbar select {
        font: inherit;
        padding: 4px 6px;
        background: #222;
        color: #ddd;
        border: 1px solid #444;
        border-radius: 6px;
      }
      #msg {
        position: fixed;
        bottom: 12px;
        left: 12px;
        padding: 8px 12px;
        background: #0008;
        border-radius: 6px;
        max-width: calc(100vw - 24px);
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="toolbar">
      <label for="demo">Demo:</label>
      <select id="demo"></select>
    </div>
    <div id="msg">napari-js — starting…</div>
    <script type="module" src="/playground/main.ts"></script>
  </body>
</html>
